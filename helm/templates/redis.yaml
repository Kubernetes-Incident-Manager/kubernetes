{{- $namespace := .Values.namespace | default .Release.Namespace -}}
{{- $redis := .Values.redis | default dict -}}
{{- $resources := .Values.resources.redis | default dict -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ get $redis "name" | default "redis" }}
  namespace: {{ $namespace }}
spec:
  replicas: {{ get $redis "replicas" | default 1 }}
  selector:
    matchLabels:
      app: {{ get $redis "name" | default "redis" }}
  template:
    metadata:
      labels:
        app: {{ get $redis "name" | default "redis" }}
    spec:
      containers:
        - name: {{ get $redis "name" | default "redis" }}
          image: {{ get $redis "image" | default "redis:7" }}
          ports:
            - containerPort: {{ get $redis "containerPort" | default 6379 }}
          resources:
            {{- toYaml $resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ get $redis "name" | default "redis" }}-svc
  namespace: {{ $namespace }}
spec:
  selector:
    app: {{ get $redis "name" | default "redis" }}
  ports:
    - port: {{ get $redis "servicePort" | default 6379 }}
      targetPort: {{ get $redis "containerPort" | default 6379 }}
  type: ClusterIP
