{{- $namespace := .Values.namespace | default .Release.Namespace -}}
{{- $gw := .Values.gateway | default dict -}}
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ get $gw "name" | default "incident-tracker-gateway" }}
  namespace: {{ $namespace }}
spec:
  gatewayClassName: {{ get $gw "className" | default "kgateway" }}
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Same
