apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: azure-kv-secrets
  namespace: dev
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    clientID: "64357ea7-2f5f-4afa-915d-314f95862d4e" # Client ID of the Workload Identity
    keyvaultName: "incident-tracker-kv"
    objects:  |
      array:
        - |
          objectName: postgresuser
          objectType: secret
        - |
          objectName: postgrespassword
          objectType: secret
        - |
          objectName: azuretenantid
          objectType: secret
        - |
          objectName: apikey
          objectType: secret
        - |
          objectName: openapiendpoint
          objectType: secret
        - |
          objectName: storage
          objectType: secret
    tenantId: "d8537334-bc24-4daf-95a8-bf4c9fb14394"
  secretObjects:
    - secretName: app-secrets
      type: Opaque
      data:
        - objectName: postgresuser
          key: POSTGRES_USER
        - objectName: postgrespassword
          key: POSTGRES_PASSWORD
        - objectName: azuretenantid
          key: AZURE_TENANT_ID
        - objectName: apikey
          key: AZURE_OPENAI_API_KEY
        - objectName: openapiendpoint
          key: AZURE_OPENAI_ENDPOINT
        - objectName: storage
          key: AZURE_STORAGE_CONNECTION_STRING
